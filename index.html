<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlantCare</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --green-deep: #1a3a2a; --green-mid: #2d5a3d; --green-bright: #4caf78;
    --green-light: #a8d5b5; --green-pale: #e8f5ed; --sand: #f5f0e8;
    --white: #fafaf8; --text-dark: #1a2a1e; --text-mid: #4a6354; --text-light: #8aaa96;
    --shadow: 0 8px 32px rgba(26,58,42,0.12); --shadow-sm: 0 2px 12px rgba(26,58,42,0.08);
    --radius: 20px; --radius-sm: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--sand); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background-image: radial-gradient(circle at 20% 20%, rgba(76,175,120,0.08) 0%, transparent 50%), radial-gradient(circle at 80% 80%, rgba(193,123,74,0.06) 0%, transparent 50%); pointer-events: none; z-index: 0; }

  /* AUTH */
  .auth-screen { position: fixed; inset: 0; background: var(--sand); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .auth-screen.hidden { display: none; }
  .auth-card { background: var(--white); border-radius: 28px; padding: 36px 28px; width: 100%; max-width: 400px; box-shadow: var(--shadow); animation: fadeUp 0.5s ease; }
  .auth-logo { text-align: center; margin-bottom: 28px; }
  .auth-logo-icon { width: 64px; height: 64px; background: linear-gradient(135deg, var(--green-mid), var(--green-bright)); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 14px; box-shadow: 0 8px 24px rgba(45,90,61,0.3); }
  .auth-logo h1 { font-family: 'Playfair Display', serif; font-size: 28px; color: var(--green-deep); }
  .auth-logo h1 span { color: var(--green-bright); }
  .auth-logo p { font-size: 14px; color: var(--text-light); margin-top: 4px; }
  .auth-tabs { display: flex; background: var(--green-pale); border-radius: 50px; padding: 4px; margin-bottom: 24px; }
  .auth-tab { flex: 1; padding: 10px; border: none; border-radius: 50px; background: none; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; color: var(--text-mid); cursor: pointer; transition: background 0.2s, color 0.2s; }
  .auth-tab.active { background: var(--white); color: var(--green-deep); box-shadow: var(--shadow-sm); }
  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .auth-form input { width: 100%; background: var(--green-pale); border: 2px solid transparent; border-radius: var(--radius-sm); padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text-dark); outline: none; transition: border-color 0.2s; }
  .auth-form input:focus { border-color: var(--green-bright); background: white; }
  .auth-error { border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; display: none; }
  .auth-error.visible { display: block; }
  .btn-auth { width: 100%; background: linear-gradient(135deg, var(--green-mid), var(--green-bright)); color: white; border: none; border-radius: 50px; padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 6px 24px rgba(45,90,61,0.35); transition: transform 0.2s, opacity 0.2s; margin-top: 4px; }
  .btn-auth:hover:not(:disabled) { transform: translateY(-2px); }
  .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; }

  /* LOADING */
  .loading-overlay { position: fixed; inset: 0; background: rgba(245,240,232,0.85); backdrop-filter: blur(6px); z-index: 400; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .loading-overlay.hidden { display: none; }
  .loading-spinner { width: 48px; height: 48px; border: 4px solid var(--green-pale); border-top-color: var(--green-bright); border-radius: 50%; animation: spin 0.8s linear infinite; }
  .loading-overlay p { color: var(--text-mid); font-size: 15px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HEADER */
  header { position: sticky; top: 0; z-index: 100; background: rgba(245,240,232,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(168,213,181,0.3); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--green-mid), var(--green-bright)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--green-deep); }
  .logo-text span { color: var(--green-bright); }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .btn-add-plant { background: linear-gradient(135deg, var(--green-mid), var(--green-bright)); color: white; border: none; border-radius: 50px; padding: 9px 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 16px rgba(45,90,61,0.3); transition: transform 0.2s; }
  .btn-add-plant:hover { transform: translateY(-2px); }
  .btn-logout { width: 36px; height: 36px; border-radius: 50%; background: var(--green-pale); border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-mid); transition: background 0.2s; }
  .btn-logout:hover { background: var(--green-light); }

  /* MAIN */
  main { position: relative; z-index: 1; padding: 20px 16px 100px; max-width: 480px; margin: 0 auto; }

  /* API KEY BANNER */
  .apikey-banner { border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; animation: fadeUp 0.4s ease; background: linear-gradient(135deg, #fff8e8, #fdf0d8); border: 1.5px solid #f0c060; }
  .apikey-banner.apikey-ok { background: #e8f8ef; border-color: var(--green-bright); }
  .apikey-icon { font-size: 22px; flex-shrink: 0; }
  .apikey-info { flex: 1; min-width: 0; }
  .apikey-info strong { font-size: 13px; color: #7a4a00; display: block; margin-bottom: 4px; }
  .apikey-banner.apikey-ok .apikey-info strong { color: var(--green-mid); }
  .apikey-input-row { display: flex; gap: 8px; margin-top: 6px; }
  .apikey-input-row input { flex: 1; background: white; border: 1.5px solid #f0c060; border-radius: 8px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text-dark); outline: none; min-width: 0; }
  .apikey-input-row input:focus { border-color: var(--green-bright); }
  .btn-apikey-save { background: var(--green-mid); color: white; border: none; border-radius: 8px; padding: 8px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; }

  /* EMPTY */
  .empty-state { text-align: center; padding: 60px 20px; animation: fadeUp 0.6s ease; }
  .empty-illustration { font-size: 80px; margin-bottom: 20px; display: block; animation: sway 3s ease-in-out infinite; }
  @keyframes sway { 0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);} }
  .empty-state h2 { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--green-deep); margin-bottom: 10px; }
  .empty-state p { color: var(--text-mid); font-size: 15px; line-height: 1.6; margin-bottom: 28px; }

  /* BUTTONS */
  .btn-primary { background: linear-gradient(135deg, var(--green-mid), var(--green-bright)); color: white; border: none; border-radius: 50px; padding: 14px 28px; font-family: 'DM Sans', sans-serif; font-size: 16px; font-weight: 500; cursor: pointer; box-shadow: 0 6px 24px rgba(45,90,61,0.35); transition: transform 0.2s; }
  .btn-primary:hover { transform: translateY(-2px); }
  .btn-secondary { flex: 1; background: var(--green-pale); color: var(--green-mid); border: none; border-radius: 50px; padding: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .btn-secondary:hover { background: var(--green-light); }
  .btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .btn-row .btn-primary { flex: 1; }

  /* PLANT CARDS */
  .section-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--green-deep); margin-bottom: 16px; }
  .plant-grid { display: flex; flex-direction: column; gap: 14px; }
  .plant-card { background: var(--white); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm); display: flex; align-items: center; gap: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; animation: fadeUp 0.4s ease; border: 1px solid rgba(168,213,181,0.2); position: relative; overflow: hidden; }
  .plant-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: linear-gradient(180deg, var(--green-bright), var(--green-light)); border-radius: 4px 0 0 4px; }
  .plant-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
  .plant-emoji { width: 56px; height: 56px; background: var(--green-pale); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
  .plant-info { flex: 1; min-width: 0; }
  .plant-name { font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 600; color: var(--green-deep); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .plant-species { font-size: 13px; color: var(--text-light); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .plant-status { display: flex; align-items: center; gap: 6px; margin-top: 6px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-bright); }
  .status-dot.none { background: var(--text-light); }
  .status-label { font-size: 12px; color: var(--text-mid); font-weight: 500; }
  .plant-actions { display: flex; flex-direction: column; gap: 6px; }
  .btn-icon { width: 36px; height: 36px; border: none; border-radius: 10px; background: var(--green-pale); color: var(--green-mid); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s, transform 0.2s; }
  .btn-icon:hover { background: var(--green-light); transform: scale(1.1); }
  .btn-icon.danger { background: #ffeaea; color: #c0392b; }
  .btn-icon.danger:hover { background: #ffd0d0; }

  /* BOTTOM NAV */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(245,240,232,0.95); backdrop-filter: blur(12px); border-top: 1px solid rgba(168,213,181,0.3); padding: 10px 0 max(10px, env(safe-area-inset-bottom)); display: flex; justify-content: space-around; z-index: 100; }
  .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; cursor: pointer; padding: 6px 20px; border-radius: 12px; color: var(--text-light); transition: color 0.2s; }
  .nav-btn.active { color: var(--green-mid); }
  .nav-btn .nav-icon { font-size: 22px; }
  .nav-btn .nav-label { font-size: 11px; font-weight: 500; }

  /* MODAL */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,42,30,0.6); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--white); border-radius: 28px 28px 0 0; padding: 28px 20px 40px; width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(100%); transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 40px; height: 4px; background: var(--green-light); border-radius: 2px; margin: 0 auto 24px; }
  .modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; color: var(--green-deep); margin-bottom: 20px; }

  /* FORM */
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-mid); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .form-group input, .form-group select { width: 100%; background: var(--green-pale); border: 2px solid transparent; border-radius: var(--radius-sm); padding: 14px 16px; font-family: 'DM Sans', sans-serif; font-size: 15px; color: var(--text-dark); outline: none; transition: border-color 0.2s, background 0.2s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--green-bright); background: white; }
  .emoji-picker { display: flex; gap: 10px; flex-wrap: wrap; }
  .emoji-option { width: 48px; height: 48px; background: var(--green-pale); border: 2px solid transparent; border-radius: 12px; font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: border-color 0.2s, transform 0.15s; }
  .emoji-option:hover { transform: scale(1.1); }
  .emoji-option.selected { border-color: var(--green-bright); background: white; }
  .error-text { color: #c0392b; font-size: 13px; margin-top: 8px; display: none; }
  .error-text.visible { display: block; }

  /* AI */
  .ai-loading { background: linear-gradient(135deg, var(--green-pale), #e0f0e8); border-radius: var(--radius-sm); padding: 20px; text-align: center; margin-top: 16px; border: 1px solid rgba(76,175,120,0.2); }
  .ai-loading-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
  .ai-loading-dots span { width: 8px; height: 8px; background: var(--green-bright); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .ai
